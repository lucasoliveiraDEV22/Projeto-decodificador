<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Decodificador Challenge</title>
    <link rel="stylesheet" href="styles/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Inter:slnt,wght@-10..0,100..900&display=swap"
      rel="stylesheet"
    />

  <body>
    <header>
      <img src="./assets/a.png" alt="logo_alura" class="logo" />
    </header>
    <main>
      <section class="input_area">
        <textarea
          name="input-text"
          class="input-text"
          placeholder="Digite seu texto"
        ></textarea>
        <div class="main_alert_span">
          <img src="/assets/exclamacao.png" alt="exclamation" />
          <span>Apenas letras minúsculas e sem acento.</span>
        </div>
        <div class="main__div__button">
          <button class="button" id="btn-codificar" onclick="">
            Criptografar
          </button>
          <button class="button" id="btn-decodificar" onclick="">
            Descriptografar
          </button>
        </div>
      </section>
      <section class="main__container__message">
        <img src="/assets/no-message-img.svg" alt="no-message-img" />
        <div class="area_msg">
          <h2>Nenhuma mensagem encontrada</h2>
          <p class="texto_message">
            Digite um texto que você deseja criptografar ou descriptografar.
          </p>
        </div>
        <!-- <button class="light-button btn_copiar" id="btn-copiar" onclick="">
          Copiar
        </button> -->
      </section>
    </main>
